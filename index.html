<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DreamHouse AI</title>

<style>

*{
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
margin:0;
background:#101820;
color:white;
}

header{
padding:25px;
text-align:center;
background:#16232e;
}

h1{
font-size:42px;
margin:0;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.card{
background:#1e2d38;
padding:20px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 10px 30px #0005;
}

button{
background:#00c896;
border:0;
padding:12px 20px;
border-radius:12px;
color:white;
font-size:16px;
cursor:pointer;
margin:5px;
}

button:hover{
background:#00a87d;
}

.house{
height:350px;
background:#ddd;
border-radius:20px;
position:relative;
overflow:hidden;
color:#333;
padding:20px;
}

.room{
background:#ffffffaa;
border:2px solid #777;
border-radius:15px;
padding:10px;
margin:5px;
display:inline-block;
}

.item{
font-size:35px;
display:inline-block;
margin:10px;
}

.price{
font-size:28px;
color:#00ffbb;
}

.switch{
display:flex;
justify-content:space-between;
margin:10px;
}

input{
transform:scale(1.5);
}


@media(max-width:600px){

h1{
font-size:30px;
}

.house{
height:400px;
}

}

</style>

</head>


<body>


<header>

<h1>🏠 DreamHouse AI</h1>

<p>Создайте дом своей мечты</p>

</header>



<div class="container">



<div class="card">

<h2>1. Размер дома</h2>


<button onclick="setHouse(100)">
🏠 100 м²
</button>


<button onclick="setHouse(250)">
🏡 250 м²
</button>


<button onclick="setHouse(500)">
🏰 500 м²
</button>


<button onclick="setHouse(1000)">
🏯 1000 м²
</button>


</div>





<div class="card">

<h2>2. Добавить комнату</h2>


<button onclick="addRoom('🛋 Гостиная',50000)">
Гостиная
</button>


<button onclick="addRoom('🍳 Кухня',30000)">
Кухня
</button>


<button onclick="addRoom('🛏 Спальня',40000)">
Спальня
</button>


<button onclick="addRoom('🏋️ Спортзал',80000)">
Спортзал
</button>


<button onclick="addRoom('🎬 Кинотеатр',120000)">
Кинотеатр
</button>


<button onclick="addRoom('🏊 Бассейн',150000)">
Бассейн
</button>



</div>






<div class="card">

<h2>3. Мебель</h2>


<button onclick="addItem('🛋',5000)">
Диван
</button>


<button onclick="addItem('🛏',7000)">
Кровать
</button>


<button onclick="addItem('🖥',3000)">
ПК
</button>


<button onclick="addItem('📺',4000)">
Телевизор
</button>


<button onclick="addItem('🚗',50000)">
Машина
</button>


<button onclick="addItem('🌳',1000)">
Сад
</button>


</div>







<div class="card">


<h2>Ваш дом</h2>


<div class="house" id="house">

Пустой участок

</div>


</div>






<div class="card">


<h2>🏠 Умный дом</h2>



<div class="switch">

Свет 💡

<input type="checkbox" onchange="smart(10000)">

</div>



<div class="switch">

Климат 🌡

<input type="checkbox" onchange="smart(20000)">

</div>




<div class="switch">

Безопасность 🔒

<input type="checkbox" onchange="smart(30000)">

</div>




<div class="switch">

Музыка 🎵

<input type="checkbox" onchange="smart(15000)">

</div>



</div>






<div class="card">


<h2>Стоимость</h2>


<div class="price" id="price">

0 $

</div>



<button onclick="saveHouse()">
💾 Сохранить
</button>


<button onclick="loadHouse()">
📂 Загрузить
</button>



</div>



</div>







<script>


let houseSize=0;

let total=0;

let rooms=[];

let items=[];





function setHouse(size){

houseSize=size;

total=size*2000;

update();

}




function addRoom(name,cost){

rooms.push(name);

total+=cost;

draw();

update();

}




function addItem(icon,cost){

items.push(icon);

total+=cost;

draw();

update();

}





function smart(cost){

total+=cost;

update();

}







function draw(){


let h=document.getElementById("house");


h.innerHTML="";


if(houseSize){

h.innerHTML+="<h2>🏠 Дом "+houseSize+" м²</h2>";

}


rooms.forEach(r=>{

h.innerHTML+=
"<div class='room'>"+r+"</div>";

});



items.forEach(i=>{

h.innerHTML+=
"<div class='item'>"+i+"</div>";

});


if(!houseSize && rooms.length==0){

h.innerHTML="Пустой участок";

}


}








function update(){

document.getElementById("price").innerHTML=
total.toLocaleString()+" $";

}







function saveHouse(){


let data={

size:houseSize,

price:total,

rooms:rooms,

items:items

};


localStorage.setItem(
"DreamHouse",
JSON.stringify(data)
);


alert("Дом сохранён!");

}








function loadHouse(){


let data=
JSON.parse(
localStorage.getItem("DreamHouse")
);



if(!data){

alert("Нет сохранений");

return;

}



houseSize=data.size;

total=data.price;

rooms=data.rooms;

items=data.items;



draw();

update();


alert("Дом загружен!");

}





</script>


</body>
</html>
